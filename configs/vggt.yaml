# VGGT Camera Estimation Configuration

# Pre-downloaded model weights (avoids runtime downloads)
yolo_model_path: yolov8x.pt  # relative to working directory, or absolute path

# Method: 'vggt' or 'droid'
method: vggt

# Device
device: cuda

# VGGT-specific settings
vggt_model_path: data/pretrained_models/vggt/model.pt
max_frames: 200  # Process up to 200 frames at once (24GB GPU limit per spec)
image_size: 518  # Input image size for VGGT (must be 518 for pretrained model)

# DROID-SLAM fallback settings
fallback_to_droid: true
droid_weights_path: null  # Uses default from TRAM if null
buffer_size: 512

# Output settings
save_depth_maps: true
save_point_cloud: true
save_visualizations: true

# Dynamic masking (Stage 1 Sub-step A)
yolo_conf: 0.3
yolo_imgsz: 640       # Resize input to this size before YOLO NMS (avoids timeout on 1080p)
yolo_batch_size: 16   # Frames per YOLO batch
sam_model: sam2.1_hiera_large.yaml
sam_checkpoint: checkpoints/sam2/sam2.1_hiera_large.pt

# Processing options
subsample_point_cloud: 4  # Subsample factor for point cloud generation
max_depth: 100.0  # Maximum valid depth in meters
min_depth: 0.1  # Minimum valid depth in meters